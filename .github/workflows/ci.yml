name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l cmd)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck --source-path=hooks install.sh uninstall.sh hooks/*.sh

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o "ai-attn-${GOOS}-${GOARCH}" \
            ./cmd/ai-attn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-attn-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ai-attn-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name 'ai-attn-*' -exec cp {} ../ \;
          cd ..
          sha256sum ai-attn-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ai-attn-*
            checksums.txt
